spring.application.name=backenddt
server.port=8000

spring.datasource.url=jdbc:mysql://localhost:3306/DB_DT?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# Keycloak - configuration
# ===============================

spring.security.oauth2.resourceserver.jwt.issuer-uri=${URI_KEYCLOAK}

# Configuration client keycloak
spring.security.oauth2.client.registration.keycloak.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.keycloak.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email

# Provider Keycloak
spring.security.oauth2.client.provider.keycloak.issuer-uri=${URI_KEYCLOAK}
spring.security.oauth2.client.provider.keycloak.authorization-uri=${URI_KEYCLOAK}/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=${URI_KEYCLOAK}/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=${URI_KEYCLOAK}/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=${URI_KEYCLOAK}/protocol/openid-connect/certs
